<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Admin Dashboard - Approve Pending Users</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #2196F3;
        }

        .header h1 {
            color: #1976D2;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .status-card {
            background: #e3f2fd;
            border: 2px solid #2196F3;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .login-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .pending-section {
            margin: 30px 0;
        }

        .pending-user {
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .pending-user.college {
            border-color: #2196F3;
            background: linear-gradient(135deg, #e3f2fd 0%, #ffffff 100%);
        }

        .pending-user.admin {
            border-color: #f44336;
            background: linear-gradient(135deg, #ffebee 0%, #ffffff 100%);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .user-details h3 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .user-details p {
            color: #666;
            margin: 4px 0;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login {
            background: #2196F3;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
        }

        .btn-login:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        .btn-approve {
            background: #4CAF50;
            color: white;
        }

        .btn-approve:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-reject {
            background: #f44336;
            color: white;
        }

        .btn-reject:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .btn-refresh {
            background: #ff9800;
            color: white;
        }

        .btn-refresh:hover {
            background: #f57c00;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-weight: bold;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .role-college {
            background: #2196F3;
            color: white;
        }

        .role-admin {
            background: #f44336;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .user-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .actions {
                width: 100%;
                justify-content: center;
            }

            button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Admin Dashboard</h1>
            <p>Approve Pending User Registrations</p>
        </div>

        <div class="login-section">
            <h2>🔑 Admin Authentication</h2>
            <p>Login to view and manage pending registrations</p>
            <br>
            <button class="btn-login" onclick="loginAsAdmin()" id="loginBtn">
                🚀 Login as Admin
            </button>
            <button class="btn-refresh" onclick="refreshPendingUsers()" id="refreshBtn" style="display: none;">
                🔄 Refresh List
            </button>
        </div>

        <div id="statusCard" class="status-card" style="display: none;">
            <h3>📊 System Status</h3>
            <p id="statusText">Ready to fetch pending registrations...</p>
        </div>

        <div id="alertContainer"></div>

        <div class="pending-section">
            <h2>👥 Pending User Registrations</h2>
            <div id="pendingContainer">
                <div class="loading">
                    🔐 Please login to view pending registrations
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        let adminToken = null;
        let pendingUsers = [];

        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            // Auto-hide after 5 seconds for success messages
            if (type === 'success') {
                setTimeout(() => {
                    alertDiv.remove();
                }, 5000);
            }
        }

        function updateStatus(text) {
            document.getElementById('statusCard').style.display = 'block';
            document.getElementById('statusText').innerHTML = text;
        }

        async function loginAsAdmin() {
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '🔄 Logging in...';

            try {
                console.log('🔐 Attempting admin login...');
                
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@college-finder.com',
                        password: 'admin123',
                        expectedRole: 'admin'
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    adminToken = data.token;
                    
                    showAlert(`✅ <strong>Admin Login Successful!</strong><br>
                              👤 Welcome, ${data.user.name}<br>
                              🏷️ Role: ${data.user.role}<br>
                              👑 Head Admin: ${data.user.isHeadAdmin ? 'Yes' : 'No'}`, 'success');
                    
                    updateStatus(`✅ Logged in as <strong>${data.user.name}</strong> | 🌐 Connected to ${API_BASE}`);
                    
                    loginBtn.style.display = 'none';
                    document.getElementById('refreshBtn').style.display = 'inline-block';
                    
                    // Automatically fetch pending users
                    await fetchPendingUsers();
                } else {
                    const error = await response.json();
                    throw new Error(error.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert(`❌ <strong>Login Failed:</strong> ${error.message}`, 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '🚀 Login as Admin';
            }
        }

        async function fetchPendingUsers() {
            if (!adminToken) {
                showAlert('❌ Please login first!', 'error');
                return;
            }

            const container = document.getElementById('pendingContainer');
            container.innerHTML = '<div class="loading">🔄 Fetching pending registrations...</div>';

            try {
                console.log('📋 Fetching pending registrations...');
                
                const response = await fetch(`${API_BASE}/api/admin/pending-registrations`, {
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'Content-Type': 'application/json',
                    },
                });

                if (response.ok) {
                    const data = await response.json();
                    pendingUsers = data.pendingRegistrations;
                    
                    console.log('📊 Received pending users:', pendingUsers);
                    
                    const collegeCount = pendingUsers.filter(u => u.role === 'college').length;
                    const adminCount = pendingUsers.filter(u => u.role === 'admin').length;
                    
                    updateStatus(`📊 <strong>${pendingUsers.length} Pending Registrations</strong> | 
                                🏫 ${collegeCount} Colleges | 👑 ${adminCount} Admins`);
                    
                    displayPendingUsers();
                    
                    if (pendingUsers.length > 0) {
                        showAlert(`📋 <strong>Found ${pendingUsers.length} pending registrations!</strong><br>
                                  🏫 ${collegeCount} colleges and 👑 ${adminCount} admins awaiting approval.`, 'warning');
                    }
                } else {
                    throw new Error(`API Error: ${response.status}`);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showAlert(`❌ <strong>Failed to fetch pending registrations:</strong> ${error.message}`, 'error');
                container.innerHTML = '<div class="loading">❌ Failed to load pending registrations</div>';
            }
        }

        function displayPendingUsers() {
            const container = document.getElementById('pendingContainer');
            
            if (pendingUsers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>✅ No Pending Registrations</h3>
                        <p>All user registrations have been processed.</p>
                        <p>New registrations will appear here for approval.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            pendingUsers.forEach(user => {
                const roleClass = user.role === 'college' ? 'college' : 'admin';
                const roleIcon = user.role === 'college' ? '🏫' : '👑';
                
                html += `
                    <div class="pending-user ${roleClass}">
                        <div class="user-info">
                            <div class="user-details">
                                <h3>${roleIcon} ${user.name}</h3>
                                <p><strong>📧 Email:</strong> ${user.email}</p>
                                <p><strong>📅 Registered:</strong> ${new Date(user.createdAt).toLocaleString()}</p>
                                <p><strong>🆔 ID:</strong> ${user.id}</p>
                                <span class="role-badge role-${user.role}">${user.role}</span>
                            </div>
                            <div class="actions">
                                <button class="btn-approve" onclick="approveUser('${user.id}', '${user.name}', '${user.role}')">
                                    ✅ Approve ${user.role === 'college' ? 'College' : 'Admin'}
                                </button>
                                <button class="btn-reject" onclick="rejectUser('${user.id}', '${user.name}', '${user.role}')">
                                    ❌ Reject
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function approveUser(id, name, role) {
            if (!confirm(`Are you sure you want to APPROVE ${name} (${role})?`)) {
                return;
            }

            await performAction('approve', id, name, role);
        }

        async function rejectUser(id, name, role) {
            if (!confirm(`Are you sure you want to REJECT ${name} (${role})?\n\nThis action cannot be undone.`)) {
                return;
            }

            await performAction('reject', id, name, role);
        }

        async function performAction(action, id, name, role) {
            try {
                console.log(`🔄 ${action}ing user ${id} (${name})`);
                
                showAlert(`🔄 ${action === 'approve' ? 'Approving' : 'Rejecting'} ${name}...`, 'warning');
                
                const response = await fetch(`${API_BASE}/api/admin/${action}-registration/${id}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    const actionText = action === 'approve' ? 'APPROVED' : 'REJECTED';
                    const emoji = action === 'approve' ? '✅' : '❌';
                    
                    showAlert(`${emoji} <strong>${actionText}!</strong><br>
                              👤 ${name} (${role}) has been ${action}d successfully.<br>
                              💬 ${result.message}`, 'success');
                    
                    console.log(`✅ ${actionText} ${name} successfully`);
                    
                    // Refresh the list
                    await fetchPendingUsers();
                } else {
                    const error = await response.json();
                    throw new Error(error.error || `Failed to ${action}`);
                }
            } catch (error) {
                console.error(`${action} error:`, error);
                showAlert(`❌ <strong>Failed to ${action} ${name}:</strong> ${error.message}`, 'error');
            }
        }

        async function refreshPendingUsers() {
            await fetchPendingUsers();
        }

        // Initialize page
        console.log('🚀 Admin Dashboard loaded - ready to manage pending registrations');
        updateStatus('🔐 Please login to view and manage pending registrations');
    </script>
</body>
</html>
